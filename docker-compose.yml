version: "3.9"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: primestore
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: primestore_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primestore"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://primestore:dev_password@db:5432/primestore_dev?sslmode=disable
      JWT_SECRET: dev_secret_key_changeme
      REDIS_URL: redis://redis:6379
      FRONT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  frontend:
    build: ./frontend
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
  proxy:
    image: nginx:1.25-alpine
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
  prometheus:
    image: prom/prometheus:latest
    depends_on:
      backend:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  grafana:
    image: grafana/grafana:10.4.1
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
volumes:
  postgres_data:
